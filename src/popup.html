<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Optimizer</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="head">
      <span class="spark">✨</span>
      <div>
        <h1>Prompt Optimizer</h1>
        <p class="sub">Selecciona texto → clic derecho → optimizar</p>
      </div>
    </header>

    <main class="form">
      <label class="field">
        <span class="label">API key de OpenAI</span>
        <div class="key-row">
          <input
            id="apiKey"
            type="password"
            placeholder="sk-…"
            autocomplete="off"
            spellcheck="false"
          />
          <button id="toggleKey" type="button" class="icon-btn" title="Mostrar/ocultar">👁</button>
        </div>
        <span class="hint">Se guarda solo en este navegador (chrome.storage.local).</span>
      </label>

      <label class="field">
        <span class="label">Modelo</span>
        <select id="model">
          <option value="gpt-4o-mini">gpt-4o-mini (rápido y económico)</option>
          <option value="gpt-4o">gpt-4o (mayor calidad)</option>
          <option value="gpt-4.1-mini">gpt-4.1-mini</option>
          <option value="gpt-3.5-turbo">gpt-3.5-turbo</option>
        </select>
      </label>

      <label class="field">
        <span class="label">Estilo de optimización</span>
        <select id="style"></select>
        <span class="hint" id="styleHint"></span>
      </label>

      <button id="save" class="btn-primary" type="button">Guardar ajustes</button>
      <p id="status" class="status" role="status"></p>
    </main>

    <footer class="foot">
      <span>v0.1.0</span>
    </footer>

    <script type="module" src="popup.js"></script>
  </body>
</html>
